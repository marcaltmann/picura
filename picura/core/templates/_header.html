{% load i18n %}
<header class="header">
  <div class="header__inner container container--wide">
    <a class="header__title" href="{% url 'welcome' %}">
      <svg xmlns="http://www.w3.org/2000/svg"
           viewBox="0 0 100 100"
           role="img"
           aria-label="Picura"
           width="48"
           height="48">
        <path d="M 30 60 A 20 20 0 0 1 70 60 Z" fill="#6b2e6b"></path>
        <line x1="8" y1="62" x2="92" y2="62" stroke="#1a1a1a" stroke-width="6" stroke-linecap="square"></line>
      </svg>
      <span>Picura</span>
    </a>
    <nav class="primary-nav">
      <ul>
        <li>
          <a href="{% url 'albums_album_list' %}">{% trans "Albums" %}</a>
        </li>
        {% if user.is_authenticated %}
          {% if user.is_staff %}
            <li>
              <a href="{% url 'backoffice_dashboard' %}">{% trans "Backoffice" %}</a>
            </li>
          {% endif %}
          <li>
            <a href="{% url 'account_email' %}">{{ user.username }}</a>
          </li>
          <li>
            <form class="logout-form" method="post" action="{% url 'account_logout' %}">
              {% csrf_token %}
              <button type="submit">{% trans "Sign out" %}</button>
            </form>
          </li>
        {% else %}
          <li>
            <a href="{% url 'account_login' %}">{% trans "Sign in" %}</a>
          </li>
        {% endif %}
      </ul>
    </nav>
  </div>
</header>
