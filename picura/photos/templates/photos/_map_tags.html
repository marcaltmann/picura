<div class="c-photo-detail__map-row">
  <div>
    <div class="c-photo-detail__map">
      <img src="{{ photo.map_tile_url }}" alt="Map of {{ photo.place }}">
    </div>
    <p class="c-photo-detail__coords">{{ photo.lat }}°, {{ photo.lng }}° — {{ photo.place }}</p>
  </div>
  <div>
    <p class="c-photo-detail__label">Tags</p>
    <ul class="c-photo-detail__tags">
      {% for tag in photo.tags %}
        <li>
          <a href="{{ tag.url }}">{{ tag.name }}</a>
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
