<a class="c-photo-card"
   href="{% url 'albums_photo_detail' album.pk photo.pk %}"
   aria-label="{{ photo.title }}">
  <div class="c-photo-card__frame">
    <img src="{{ photo.thumbnail_500.url }}"
         srcset="{{ photo.thumbnail_300.url }} 300w,
                 {{ photo.thumbnail_500.url }} 500w,
                 {{ photo.thumbnail_800.url }} 800w"
         sizes="250px"
         alt=""
         loading="lazy">
    <div class="c-photo-card__caption">
      <p class="c-photo-card__title">{{ photo.title }}</p>
    </div>
  </div>
</a>
