<div class="c-action-bar">
    <button type="button"
            class="c-action-bar__item c-action-bar__item--star"
            aria-pressed="{{ photo.is_starred|yesno:'true,false' }}"
            data-star-url="">
    <svg class="c-action-bar__icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2l2.95 6.55 7.05.8-5.2 4.95 1.45 7-6.25-3.55-6.25 3.55 1.45-7-5.2-4.95 7.05-.8z"/></svg>
    <span>{{ photo.is_starred|yesno:'Starred,Star' }}</span>
    </button>
    <a class="c-action-bar__item" href="{{ photo.file.url }}">
    <svg class="c-action-bar__icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
    <span>Download</span>
    </a>
    <button type="button" class="c-action-bar__item" data-act="copy-link"
            data-url="{{ request.build_absolute_uri }}">
    <svg class="c-action-bar__icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14a4 4 0 010-5.6l3-3a4 4 0 015.6 5.6l-1.5 1.5M14 10a4 4 0 010 5.6l-3 3a4 4 0 01-5.6-5.6l1.5-1.5"/></svg>
    <span>Copy link</span>
    </button>
    <button type="button" class="c-action-bar__item" data-act="add-to-collection">
    <svg class="c-action-bar__icon" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v14M5 12h14"/></svg>
    <span>Add to collection</span>
    </button>
</div>
