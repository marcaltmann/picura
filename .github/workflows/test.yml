name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: curio
          POSTGRES_USER: curio
          POSTGRES_PASSWORD: curio
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DB_NAME: curio
      DB_USER: curio
      DB_PASSWORD: curio
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8
        with:
          python-version-file: .python-version

      - run: uv sync --group dev

      - run: uv run pytest
